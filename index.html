<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/faviconlight-32x32.png" id="favicon" />

    <!-- Theme -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem("theme");
          var theme =
            saved === "system" || !saved
              ? window.matchMedia &&
                window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light"
              : saved;
          document.documentElement.setAttribute("data-theme", theme);
          var favicon = document.getElementById("favicon");
          if (favicon) {
            favicon.href = theme === "dark" ? "/favicondark-32x32.png" : "/faviconlight-32x32.png";
          }
        } catch (e) {}
      })();
    </script>

    <meta
